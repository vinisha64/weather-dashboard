<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skyline — Weather</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="sky"></div>
  <div class="grain"></div>
  <div class="particles" id="particles"></div>

  <div class="app" id="app">

    <header class="topline">
      <span class="mark">SKYLINE</span>
      <span class="mark-sub">current conditions, anywhere</span>
    </header>

    <form class="search" id="searchForm" autocomplete="off">
      <input
        type="text"
        id="cityInput"
        placeholder="Search a city…"
        aria-label="City name"
      />
      <button type="submit" id="searchBtn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="8" cy="8" r="6.2" stroke="currentColor" stroke-width="1.6"/>
          <line x1="12.6" y1="12.6" x2="16.5" y2="16.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
    </form>

    <main id="result" class="result">
      <div class="placeholder">
        <p class="placeholder-title">No city selected</p>
        <p class="placeholder-sub">Try “Bengaluru”, “Tokyo”, or “Reykjavik”.</p>
      </div>
    </main>

    <footer class="foot">
      <span id="lastUpdated"></span>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
